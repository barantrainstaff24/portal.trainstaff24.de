<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verbindungstest</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; background: #0b0b0d; color: white; }
    h2 { color: #0A84FF; }
    p { color: #a1a1a6; font-size: 14px; }
    button { background: #0A84FF; color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; font-weight: 700; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #ergebnis { margin-top: 20px; padding: 16px; border-radius: 10px; font-size: 14px; display: none; }
    .ok     { background: #1a3a1a; color: #32D74B; border: 1px solid #32D74B; }
    .fehler { background: #3a1a1a; color: #FF453A; border: 1px solid #FF453A; }
  </style>
</head>
<body>
  <h2>Verbindungstest</h2>
  <p>Testet ob GitHub Pages mit dem Apps Script Backend kommunizieren kann.</p>
  <button onclick="testVerbindung()">Verbindung testen</button>
  <div id="ergebnis"></div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5B00BzYQJhyp0XTwtlh5p0_fx8-jLvyfZcbddfGE10bbLROX_LkEHlTra8DvVTfbn/exec';

    async function testVerbindung() {
      const btn = document.querySelector('button');
      const out = document.getElementById('ergebnis');
      btn.innerText = 'Wird getestet...';
      btn.disabled = true;
      out.style.display = 'none';
      try {
        const res = await fetch(APPS_SCRIPT_URL + '?action=ping');
        const data = await res.json();
        if (data.erfolg) {
          out.className = 'ok';
          out.innerText = '✅ ' + data.nachricht;
        } else {
          out.className = 'fehler';
          out.innerText = '❌ Antwort erhalten aber Fehler: ' + JSON.stringify(data);
        }
      } catch(err) {
        out.className = 'fehler';
        out.innerText = '❌ Verbindung fehlgeschlagen: ' + err.message;
      }
      out.style.display = 'block';
      btn.innerText = 'Nochmal testen';
      btn.disabled = false;
    }
  </script>
</body>
</html>
